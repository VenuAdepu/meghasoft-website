<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | Meghasoft</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0a1628;
    --navy2: #0f2040;
    --blue: #1a4fbd;
    --blue-light: #2563eb;
    --cyan: #06b6d4;
    --white: #ffffff;
    --text-muted: #94a3b8;
    --text-body: #cbd5e1;
    --border: rgba(255,255,255,0.08);
    --font-head: 'DM Serif Display', Georgia, serif;
    --font-body: 'Sora', sans-serif;
  }

  html, body {
    height: 100%;
    font-family: var(--font-body);
    background: var(--navy);
    color: var(--white);
    overflow: hidden;
  }

  /* Background effects */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 70% 60% at 50% 0%, rgba(37,99,235,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 80% 80%, rgba(6,182,212,0.10) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 10% 70%, rgba(37,99,235,0.08) 0%, transparent 60%);
  }
  .grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Nav */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 5%;
    background: rgba(10,22,40,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: var(--font-head);
    font-size: 1.6rem;
    color: var(--white);
    text-decoration: none;
    display: flex; align-items: center; gap: 10px;
  }
  .logo-mark {
    width: 36px; height: 36px; border-radius: 8px;
    background: linear-gradient(135deg, var(--blue-light), var(--cyan));
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-body);
    font-weight: 700; font-size: 1rem; color: #fff;
  }

  /* Main content */
  main {
    position: relative; z-index: 1;
    height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 2rem 5%;
  }

  .error-code {
    font-family: var(--font-head);
    font-size: clamp(7rem, 20vw, 14rem);
    line-height: 1;
    background: linear-gradient(135deg, rgba(37,99,235,0.6), rgba(6,182,212,0.8));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.25rem;
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .divider {
    width: 60px; height: 3px;
    background: linear-gradient(90deg, var(--blue-light), var(--cyan));
    border-radius: 100px;
    margin: 0 auto 1.75rem;
  }

  h1 {
    font-family: var(--font-head);
    font-size: clamp(1.6rem, 4vw, 2.5rem);
    font-weight: 400;
    margin-bottom: 1rem;
    line-height: 1.2;
  }
  h1 em { font-style: italic; color: var(--cyan); }

  p {
    color: var(--text-body);
    font-size: 1rem;
    font-weight: 300;
    max-width: 480px;
    margin: 0 auto 2.5rem;
    line-height: 1.7;
  }

  .btn-group { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }

  .btn-primary {
    background: var(--blue-light); color: #fff;
    padding: 0.85rem 2rem; border-radius: 10px;
    font-family: var(--font-body); font-size: 0.95rem; font-weight: 600;
    text-decoration: none; transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-primary:hover { background: var(--blue); transform: translateY(-2px); }

  .btn-secondary {
    background: transparent; color: #fff;
    padding: 0.85rem 2rem; border-radius: 10px;
    font-family: var(--font-body); font-size: 0.95rem; font-weight: 500;
    text-decoration: none; transition: all 0.2s;
    border: 1px solid var(--border);
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2); }

  /* Quick links */
  .quick-links {
    margin-top: 3.5rem;
    padding-top: 2.5rem;
    border-top: 1px solid var(--border);
    width: 100%; max-width: 600px;
  }
  .quick-links p {
    font-size: 0.78rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-muted);
    margin-bottom: 1.25rem;
  }
  .links-row { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  .quick-link {
    color: var(--text-body); text-decoration: none;
    font-size: 0.85rem; font-weight: 400;
    padding: 0.4rem 1rem;
    border: 1px solid var(--border);
    border-radius: 100px;
    transition: all 0.2s;
  }
  .quick-link:hover { color: var(--white); border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); }
</style>
</head>
<body>

<div class="bg"></div>
<div class="grid"></div>

<nav>
  <a href="/" class="logo">
    <div class="logo-mark">M</div>
    Meghasoft
  </a>
</nav>

<main>
  <div class="error-code">404</div>
  <div class="divider"></div>
  <h1>Page <em>Not Found</em></h1>
  <p>The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>

  <div class="btn-group">
    <a href="/" class="btn-primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      Back to Home
    </a>
    <a href="/#contact-form" class="btn-secondary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
      Contact Us
    </a>
  </div>

  <div class="quick-links">
    <p>Or jump to</p>
    <div class="links-row">
      <a href="/#services" class="quick-link">Services</a>
      <a href="/#about" class="quick-link">Platforms</a>
      <a href="/#industries" class="quick-link">Industries</a>
      <a href="/#testimonials" class="quick-link">Clients</a>
      <a href="/#contact-form" class="quick-link">Get in Touch</a>
    </div>
  </div>
</main>

</body>
</html>
